x-postgres-env: &postgres-env
  POSTGRES_USER: admin
  POSTGRES_PASSWORD: admin
  POSTGRES_DB: mua_zui_shop_db

x-spring-base-env: &spring-base-env
  SPRING_PROFILES_ACTIVE: docker
  EUREKA_HOST: eureka-server
  EUREKA_PORT: "8761"
  EUREKA_INSTANCE_PREFER_IP_ADDRESS: "false"

x-spring-full-env: &spring-full-env
  <<: *spring-base-env
  DB_HOST: postgres
  DB_PORT: "5432"
  DB_NAME: mua_zui_shop_db
  USER_DB: admin
  PASSWORD_DB: admin
  SPRING_DATA_REDIS_HOST: redis
  SPRING_DATA_REDIS_PORT: "6379"
  SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092

networks:
  mua-zui-shop-net:
    driver: bridge
    name: mua-zui-shop-net

volumes:
  postgres-data:
    driver: local
  redis-data:
    driver: local
  kafka-data:
    driver: local

services:
  postgres:
    image: postgres:18-alpine
    container_name: postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      <<: *postgres-env
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - mua-zui-shop-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d mua_zui_shop_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7.2.4-alpine
    container_name: redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - mua-zui-shop-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: kafka
    restart: unless-stopped
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: 'broker,controller'
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
      KAFKA_LISTENERS: 'PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093'
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT'
      KAFKA_ADVERTISED_LISTENERS: 'PLAINTEXT://kafka:9092'
      KAFKA_INTER_BROKER_LISTENER_NAME: 'PLAINTEXT'
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@kafka:9093'
      CLUSTER_ID: 'MkU3OEVBNTcwNTJENDM2Qk'
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    volumes:
      - kafka-data:/var/lib/kafka/data
    networks:
      - mua-zui-shop-net
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "127.0.0.1:9092", "--list"]
      interval: 15s
      timeout: 5s
      retries: 5

  kafka-ui:
    image: provectuslabs/kafka-ui:v0.7.2
    container_name: kafka_ui
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: "local-cluster"
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: "kafka:9092"
      DYNAMIC_CONFIG_ENABLED: "true"
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - mua-zui-shop-net

  eureka-server:
    build:
      context: ./eureka-server
      dockerfile: Dockerfile
    container_name: eureka_server
    restart: on-failure
    ports:
      - "8761:8761"
    environment:
      EUREKA_HOST: eureka-server
      EUREKA_PORT: "8761"
    networks:
      - mua-zui-shop-net
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8761/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  api-gateway:
    build:
      context: ./api-gateway
      args:
        GITHUB_ACTOR: ${GITHUB_ACTOR}
        GITHUB_TOKEN: ${GITHUB_TOKEN}
      dockerfile: Dockerfile
    container_name: api_gateway
    restart: on-failure
    ports:
      - "8000:8000"
    environment:
      <<: *spring-base-env
      APP_PORT: "8000"
    depends_on:
      eureka-server:
        condition: service_healthy
    networks:
      - mua-zui-shop-net

  auth-service:
    build:
      context: ./auth-service
      args:
        GITHUB_ACTOR: ${GITHUB_ACTOR}
        GITHUB_TOKEN: ${GITHUB_TOKEN}
      dockerfile: Dockerfile
    container_name: auth_service
    restart: on-failure
    ports:
      - "8001:8001"
    environment:
      <<: *spring-full-env
      APP_PORT: "8001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
    networks:
      - mua-zui-shop-net

  customer-service:
    build:
      context: ./customer-service
      args:
        GITHUB_ACTOR: ${GITHUB_ACTOR}
        GITHUB_TOKEN: ${GITHUB_TOKEN}
      dockerfile: Dockerfile
    container_name: customer_service
    restart: on-failure
    ports:
      - "8002:8002"
    environment:
      <<: *spring-full-env
      APP_PORT: "8002"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
    networks:
      - mua-zui-shop-net